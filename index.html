<!DOCTYPE html>
<html lang="en">
<!-- Created with Perplexity Computer — https://www.perplexity.ai/computer -->
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a1223"/>
  <title>tor-replay — Live Tor Relay Dashboard</title>
  <meta name="description" content="Interactive world map of live Tor relay entry/exit nodes, built with egui and WebAssembly."/>

  <link data-trunk rel="rust" data-target-name="tor_replay" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a1223;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a1223;
      color: #5eecd8;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      z-index: 999;
    }
    #loading .onion {
      width: 64px;
      height: 64px;
      animation: spin 2s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <svg class="onion" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="28" stroke="#5eecd8" stroke-width="3" opacity="0.3"/>
      <circle cx="32" cy="32" r="19" stroke="#5eecd8" stroke-width="3" opacity="0.6"/>
      <circle cx="32" cy="32" r="10" stroke="#5eecd8" stroke-width="3" opacity="0.9"/>
      <circle cx="32" cy="32" r="3"  fill="#5eecd8"/>
    </svg>
    <span>tor-replay</span>
    <span style="color:#64819e; font-size:11px; margin-top:6px;">loading WebAssembly…</span>
  </div>

  <canvas id="the_canvas_id"></canvas>

  <script type="module">
    // Hide loading screen when Trunk has initialised the WASM module.
    // Trunk fires TrunkApplicationStarted after calling wasm init().
    window.addEventListener('TrunkApplicationStarted', () => {
      const loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
      // Start the egui app on the canvas
      if (window.wasmBindings && window.wasmBindings.start) {
        try {
          window.wasmBindings.start('the_canvas_id');
        } catch(e) {
          console.error('tor-replay start failed:', e);
        }
      }
    });
  </script>
</body>
</html>
